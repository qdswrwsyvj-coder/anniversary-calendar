<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易彰哲🎁叶姿得专属纪念日日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 标题样式 */
        .main-title {
            text-align: center;
            font-size: 2.8em;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            padding: 30px 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .year-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .year-selector button {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .year-selector button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .year-selector span {
            font-size: 1.8em;
            font-weight: bold;
            color: #764ba2;
            min-width: 100px;
            text-align: center;
        }

        /* 添加纪念日面板 */
        .add-memory {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }

        .add-memory h3 {
            color: #764ba2;
            margin-bottom: 15px;
            text-align: center;
        }

        .memory-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .memory-form input[type="date"] {
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .memory-form input[type="date"]:focus {
            border-color: #764ba2;
        }

        .memory-form input[type="text"] {
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 250px;
            outline: none;
            transition: border-color 0.3s;
        }

        .memory-form input[type="text"]:focus {
            border-color: #764ba2;
        }

        .memory-form button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .memory-form button:hover {
            transform: scale(1.05);
        }

        /* 月份容器 */
        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .month-card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .month-card:hover {
            transform: translateY(-5px);
        }

        .month-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
        }

        .month-header.special {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
        }

        /* 星期标题 */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f8f9fa;
            padding: 10px 5px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #666;
            font-size: 0.9em;
        }

        .weekday:nth-child(1), .weekday:nth-child(7) {
            color: #ff6b6b;
        }

        /* 日期格子 */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 5px;
        }

        .day-cell {
            min-height: 70px;
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: #fff;
            border: 1px solid transparent;
        }

        .day-cell:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .day-cell.empty {
            background: transparent;
            cursor: default;
        }

        .day-cell.empty:hover {
            background: transparent;
            border-color: transparent;
        }

        .day-cell.today {
            background: linear-gradient(135deg, #48dbfb, #0abde3);
            border: 2px solid #0984e3;
        }

        .day-cell.today .solar-date {
            color: white;
            font-weight: bold;
        }

        .day-cell.today .lunar-date {
            color: #e0f7ff;
        }

        .day-cell.has-memory {
            background: linear-gradient(135deg, #fff9e6, #ffe6e6);
            border: 2px solid #ff6b6b;
        }

        .day-cell.has-memory::after {
            content: '💕';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.8em;
        }

        .solar-date {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 2px;
        }

        .day-cell:nth-child(7n+1) .solar-date,
        .day-cell:nth-child(7n) .solar-date {
            color: #ff6b6b;
        }

        .lunar-date {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 2px;
        }

        .festival {
            font-size: 0.7em;
            color: #e74c3c;
            font-weight: bold;
            line-height: 1.2;
        }

        .solar-term {
            font-size: 0.7em;
            color: #27ae60;
            font-weight: bold;
        }

        .memory-tag {
            font-size: 0.65em;
            color: #fff;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            padding: 1px 4px;
            border-radius: 3px;
            margin-top: 1px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 弹出框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal h3 {
            color: #764ba2;
            margin-bottom: 20px;
            padding-right: 30px;
        }

        .modal-info {
            margin-bottom: 15px;
        }

        .modal-info label {
            display: block;
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .modal-info p {
            font-size: 1.1em;
            color: #333;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .memory-list {
            margin-top: 20px;
        }

        .memory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: linear-gradient(135deg, #fff9e6, #ffe6e6);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .memory-item span {
            flex: 1;
            color: #333;
        }

        .memory-item button {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            background: #ff6b6b;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        .memory-item button:hover {
            background: #e74c3c;
        }

        /* 图例 */
        .legend {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        .legend-color.today {
            background: linear-gradient(135deg, #48dbfb, #0abde3);
        }

        .legend-color.memory {
            background: linear-gradient(135deg, #fff9e6, #ffe6e6);
            border: 2px solid #ff6b6b;
        }

        .legend-color.festival {
            background: #e74c3c;
        }

        .legend-color.term {
            background: #27ae60;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 1.8em;
            }

            .months-grid {
                grid-template-columns: 1fr;
            }

            .day-cell {
                min-height: 60px;
            }

            .memory-form {
                flex-direction: column;
            }

            .memory-form input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">易彰哲🎁叶姿得专属纪念日日历</h1>
        
        <div class="control-panel">
            <div class="year-selector">
                <button id="prevYear">◀ 上一年</button>
                <span id="currentYear">2026</span>
                <button id="nextYear">下一年 ▶</button>
            </div>
            
            <div class="add-memory">
                <h3>💕 添加我们的纪念日</h3>
                <div class="memory-form">
                    <input type="date" id="memoryDate">
                    <input type="text" id="memoryText" placeholder="输入纪念日描述...">
                    <button id="addMemoryBtn">添加纪念日</button>
                </div>
            </div>
        </div>

        <div class="months-grid" id="calendarContainer"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color today"></div>
                <span>今天</span>
            </div>
            <div class="legend-item">
                <div class="legend-color memory"></div>
                <span>纪念日</span>
            </div>
            <div class="legend-item">
                <div class="legend-color festival"></div>
                <span>节日</span>
            </div>
            <div class="legend-item">
                <div class="legend-color term"></div>
                <span>节气</span>
            </div>
        </div>
    </div>

    <div class="modal" id="dayModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">×</span>
            <h3 id="modalTitle">日期详情</h3>
            <div class="modal-info">
                <label>阳历日期</label>
                <p id="modalSolar"></p>
            </div>
            <div class="modal-info">
                <label>农历日期</label>
                <p id="modalLunar"></p>
            </div>
            <div class="modal-info">
                <label>节日/节气</label>
                <p id="modalFestival"></p>
            </div>
            <div class="memory-list" id="modalMemoryList"></div>
        </div>
    </div>

    <script>
        // ==================== 农历数据 ====================
        const lunarInfo = [
            0x04bd8, 0x04ae0, 0x0a570, 0x054d5, 0x0d260, 0x0d950, 0x16554, 0x056a0, 0x09ad0, 0x055d2,
            0x04ae0, 0x0a5b6, 0x0a4d0, 0x0d250, 0x1d255, 0x0b540, 0x0d6a0, 0x0ada2, 0x095b0, 0x14977,
            0x04970, 0x0a4b0, 0x0b4b5, 0x06a50, 0x06d40, 0x1ab54, 0x02b60, 0x09570, 0x052f2, 0x04970,
            0x06566, 0x0d4a0, 0x0ea50, 0x06e95, 0x05ad0, 0x02b60, 0x186e3, 0x092e0, 0x1c8d7, 0x0c950,
            0x0d4a0, 0x1d8a6, 0x0b550, 0x056a0, 0x1a5b4, 0x025d0, 0x092d0, 0x0d2b2, 0x0a950, 0x0b557,
            0x06ca0, 0x0b550, 0x15355, 0x04da0, 0x0a5b0, 0x14573, 0x052b0, 0x0a9a8, 0x0e950, 0x06aa0,
            0x0aea6, 0x0ab50, 0x04b60, 0x0aae4, 0x0a570, 0x05260, 0x0f263, 0x0d950, 0x05b57, 0x056a0,
            0x096d0, 0x04dd5, 0x04ad0, 0x0a4d0, 0x0d4d4, 0x0d250, 0x0d558, 0x0b540, 0x0b6a0, 0x195a6,
            0x095b0, 0x049b0, 0x0a974, 0x0a4b0, 0x0b27a, 0x06a50, 0x06d40, 0x0af46, 0x0ab60, 0x09570,
            0x04af5, 0x04970, 0x064b0, 0x074a3, 0x0ea50, 0x06b58, 0x05ac0, 0x0ab60, 0x096d5, 0x092e0,
            0x0c960, 0x0d954, 0x0d4a0, 0x0da50, 0x07552, 0x056a0, 0x0abb7, 0x025d0, 0x092d0, 0x0cab5,
            0x0a950, 0x0b4a0, 0x0baa4, 0x0ad50, 0x055d9, 0x04ba0, 0x0a5b0, 0x15176, 0x052b0, 0x0a930,
            0x07954, 0x06aa0, 0x0ad50, 0x05b52, 0x04b60, 0x0a6e6, 0x0a4e0, 0x0d260, 0x0ea65, 0x0d530,
            0x05aa0, 0x076a3, 0x096d0, 0x04afb, 0x04ad0, 0x0a4d0, 0x1d0b6, 0x0d250, 0x0d520, 0x0dd45,
            0x0b5a0, 0x056d0, 0x055b2, 0x049b0, 0x0a577, 0x0a4b0, 0x0aa50, 0x1b255, 0x06d20, 0x0ada0,
            0x14b63, 0x09370, 0x049f8, 0x04970, 0x064b0, 0x168a6, 0x0ea50, 0x06b20, 0x1a6c4, 0x0aae0,
            0x0a2e0, 0x0d2e3, 0x0c960, 0x0d557, 0x0d4a0, 0x0da50, 0x05d55, 0x056a0, 0x0a6d0, 0x055d4,
            0x052d0, 0x0a9b8, 0x0a950, 0x0b4a0, 0x0b6a6, 0x0ad50, 0x055a0, 0x0aba4, 0x0a5b0, 0x052b0,
            0x0b273, 0x06930, 0x07337, 0x06aa0, 0x0ad50, 0x14b55, 0x04b60, 0x0a570, 0x054e4, 0x0d160,
            0x0e968, 0x0d520, 0x0daa0, 0x16aa6, 0x056d0, 0x04ae0, 0x0a9d4, 0x0a2d0, 0x0d150, 0x0f252,
            0x0d520
        ];

        const Gan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        const Zhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const Animals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
        const lunarMonthNames = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
        const lunarDayNames = [
            '初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
            '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
            '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'
        ];

        // 农历计算函数
        function lYearDays(y) {
            let sum = 348;
            for (let i = 0x8000; i > 0x8; i >>= 1) {
                sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
            }
            return sum + leapDays(y);
        }

        function leapMonth(y) {
            return lunarInfo[y - 1900] & 0xf;
        }

        function leapDays(y) {
            if (leapMonth(y)) {
                return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29;
            }
            return 0;
        }

        function monthDays(y, m) {
            return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29;
        }

        function solarToLunar(y, m, d) {
            if (y < 1900 || y > 2100) return null;
            
            let offset = 0;
            for (let i = 1900; i < y; i++) {
                offset += lYearDays(i);
            }
            
            const solarMonthDays = [31, 28 + (isLeapYear(y) ? 1 : 0), 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            for (let i = 0; i < m - 1; i++) {
                offset += solarMonthDays[i];
            }
            offset += d - 31; // 从1900年1月31日开始

            let temp = 0;
            let year = 1900;
            let leap = 0;
            let isLeap = false;

            for (year = 1900; year < 2101 && offset > 0; year++) {
                temp = lYearDays(year);
                offset -= temp;
            }
            if (offset < 0) {
                offset += temp;
                year--;
            }

            leap = leapMonth(year);
            isLeap = false;

            let month = 1;
            for (month = 1; month < 13 && offset > 0; month++) {
                if (leap > 0 && month === (leap + 1) && !isLeap) {
                    --month;
                    isLeap = true;
                    temp = leapDays(year);
                } else {
                    temp = monthDays(year, month);
                }

                if (isLeap && month === (leap + 1)) {
                    isLeap = false;
                }

                offset -= temp;
            }

            if (offset === 0 && leap > 0 && month === leap + 1) {
                if (isLeap) {
                    isLeap = false;
                } else {
                    isLeap = true;
                    --month;
                }
            }

            if (offset < 0) {
                offset += temp;
                --month;
            }

            const day = offset + 1;

            return {
                year: year,
                month: month,
                day: day,
                isLeap: isLeap,
                monthStr: (isLeap ? '闰' : '') + lunarMonthNames[month - 1] + '月',
                dayStr: lunarDayNames[day - 1],
                yearGanZhi: Gan[(year - 4) % 10] + Zhi[(year - 4) % 12],
                animal: Animals[(year - 4) % 12]
            };
        }

        function isLeapYear(y) {
            return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
        }

        // ==================== 节气数据 ====================
        const solarTerms = [
            '小寒', '大寒', '立春', '雨水', '惊蛰', '春分',
            '清明', '谷雨', '立夏', '小满', '芒种', '夏至',
            '小暑', '大暑', '立秋', '处暑', '白露', '秋分',
            '寒露', '霜降', '立冬', '小雪', '大雪', '冬至'
        ];

        const sTermInfo = [
            0, 21208, 42467, 63836, 85337, 107014,
            128867, 150921, 173149, 195551, 218072, 240693,
            263343, 285989, 308563, 331033, 353350, 375494,
            397447, 419210, 440795, 462224, 483532, 504758
        ];

        function getSolarTerm(y, m, d) {
            const baseDate = new Date(1900, 0, 6, 2, 5, 0);
            const targetDate = new Date(y, m - 1, d);
            
            for (let i = (m - 1) * 2; i < m * 2; i++) {
                const termDate = new Date(baseDate.getTime() + sTermInfo[i] * 60000);
                if (termDate.getFullYear() === y && 
                    termDate.getMonth() === m - 1 && 
                    termDate.getDate() === d) {
                    return solarTerms[i];
                }
            }
            return null;
        }

        // ==================== 节日数据 ====================
        const solarFestivals = {
            '1-1': '元旦',
            '2-14': '情人节',
            '3-8': '妇女节',
            '3-12': '植树节',
            '4-1': '愚人节',
            '5-1': '劳动节',
            '5-4': '青年节',
            '6-1': '儿童节',
            '7-1': '建党节',
            '8-1': '建军节',
            '9-10': '教师节',
            '10-1': '国庆节',
            '10-31': '万圣节',
            '11-11': '双十一',
            '12-24': '平安夜',
            '12-25': '圣诞节'
        };

        const lunarFestivals = {
            '1-1': '春节',
            '1-15': '元宵节',
            '2-2': '龙抬头',
            '5-5': '端午节',
            '7-7': '七夕',
            '7-15': '中元节',
            '8-15': '中秋节',
            '9-9': '重阳节',
            '12-8': '腊八节',
            '12-23': '小年',
            '12-30': '除夕'
        };

        // 获取母亲节(5月第二个星期日)
        function getMotherDay(year) {
            const may = new Date(year, 4, 1);
            const firstSunday = may.getDay() === 0 ? 1 : 8 - may.getDay() + 1;
            return firstSunday + 7;
        }

        // 获取父亲节(6月第三个星期日)
        function getFatherDay(year) {
            const june = new Date(year, 5, 1);
            const firstSunday = june.getDay() === 0 ? 1 : 8 - june.getDay();
            return firstSunday + 14;
        }

        // 获取感恩节(11月第四个星期四)
        function getThanksgiving(year) {
            const nov = new Date(year, 10, 1);
            const firstThursday = nov.getDay() <= 4 ? 4 - nov.getDay() + 1 : 11 - nov.getDay() + 1;
            return firstThursday + 21;
        }

        function getFestival(y, m, d, lunar) {
            const solarKey = m + '-' + d;
            let festival = solarFestivals[solarKey] || '';
            
            // 母亲节
            if (m === 5 && d === getMotherDay(y)) {
                festival = '母亲节';
            }
            // 父亲节
            if (m === 6 && d === getFatherDay(y)) {
                festival = '父亲节';
            }
            // 感恩节
            if (m === 11 && d === getThanksgiving(y)) {
                festival = '感恩节';
            }

            // 农历节日
            if (lunar) {
                const lunarKey = lunar.month + '-' + lunar.day;
                const lunarFestival = lunarFestivals[lunarKey];
                if (lunarFestival) {
                    festival = festival ? festival + '/' + lunarFestival : lunarFestival;
                }
            }

            return festival;
        }

        // ==================== 纪念日存储 ====================
        let memories = JSON.parse(localStorage.getItem('coupleMemories') || '{}');

        function saveMemories() {
            localStorage.setItem('coupleMemories', JSON.stringify(memories));
        }

        function addMemory(dateStr, text) {
            if (!memories[dateStr]) {
                memories[dateStr] = [];
            }
            memories[dateStr].push(text);
            saveMemories();
        }

        function removeMemory(dateStr, index) {
            if (memories[dateStr]) {
                memories[dateStr].splice(index, 1);
                if (memories[dateStr].length === 0) {
                    delete memories[dateStr];
                }
                saveMemories();
            }
        }

        function getMemories(dateStr) {
            return memories[dateStr] || [];
        }

        // ==================== 日历渲染 ====================
        let currentYear = new Date().getFullYear();

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month - 1, 1).getDay();
        }

        function renderCalendar(year) {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';
            
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                                '七月', '八月', '九月', '十月', '十一月', '十二月'];
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;

            for (let month = 1; month <= 12; month++) {
                const monthCard = document.createElement('div');
                monthCard.className = 'month-card';
                
                // 月份标题
                const monthHeader = document.createElement('div');
                monthHeader.className = 'month-header';
                monthHeader.textContent = monthNames[month - 1];
                monthCard.appendChild(monthHeader);

                // 星期标题
                const weekdaysDiv = document.createElement('div');
                weekdaysDiv.className = 'weekdays';
                weekDays.forEach(day => {
                    const weekday = document.createElement('div');
                    weekday.className = 'weekday';
                    weekday.textContent = day;
                    weekdaysDiv.appendChild(weekday);
                });
                monthCard.appendChild(weekdaysDiv);

                // 日期网格
                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';

                const firstDay = getFirstDayOfMonth(year, month);
                const daysInMonth = getDaysInMonth(year, month);

                // 填充空白
                for (let i = 0; i < firstDay; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty';
                    daysGrid.appendChild(emptyCell);
                }

                // 填充日期
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayCell = document.createElement('div');
                    const dateStr = `${year}-${month}-${day}`;
                    
                    // 判断是否今天
                    if (dateStr === todayStr) {
                        dayCell.classList.add('today');
                    }

                    // 获取农历
                    const lunar = solarToLunar(year, month, day);

                    // 判断是否有纪念日
                    const dayMemories = getMemories(dateStr);
                    if (dayMemories.length > 0) {
                        dayCell.classList.add('has-memory');
                    }

                    // 阳历日期
                    const solarDiv = document.createElement('div');
                    solarDiv.className = 'solar-date';
                    solarDiv.textContent = day;
                    dayCell.appendChild(solarDiv);

                    // 农历日期
                    const lunarDiv = document.createElement('div');
                    lunarDiv.className = 'lunar-date';
                    if (lunar) {
                        // 显示农历月份（初一）或日期
                        if (lunar.day === 1) {
                            lunarDiv.textContent = lunar.monthStr;
                        } else {
                            lunarDiv.textContent = lunar.dayStr;
                        }
                    }
                    dayCell.appendChild(lunarDiv);

                    // 获取节日
                    const festival = getFestival(year, month, day, lunar);
                    // 获取节气
                    const term = getSolarTerm(year, month, day);

                    // 显示节日或节气
                    if (festival) {
                        const festivalDiv = document.createElement('div');
                        festivalDiv.className = 'festival';
                        festivalDiv.textContent = festival;
                        dayCell.appendChild(festivalDiv);
                    } else if (term) {
                        const termDiv = document.createElement('div');
                        termDiv.className = 'solar-term';
                        termDiv.textContent = term;
                        dayCell.appendChild(termDiv);
                    }

                    // 显示纪念日（最多显示第一个）
                    if (dayMemories.length > 0) {
                        const memoryDiv = document.createElement('div');
                        memoryDiv.className = 'memory-tag';
                        memoryDiv.textContent = '💕' + dayMemories[0];
                        dayCell.appendChild(memoryDiv);
                    }

                    // 点击事件
                    dayCell.addEventListener('click', () => showDayDetail(year, month, day, lunar, festival, term, dayMemories, dateStr));

                    daysGrid.appendChild(dayCell);
                }

                monthCard.appendChild(daysGrid);
                container.appendChild(monthCard);
            }
        }

        // ==================== 日期详情弹窗 ====================
        function showDayDetail(year, month, day, lunar, festival, term, dayMemories, dateStr) {
            const modal = document.getElementById('dayModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalSolar = document.getElementById('modalSolar');
            const modalLunar = document.getElementById('modalLunar');
            const modalFestival = document.getElementById('modalFestival');
            const modalMemoryList = document.getElementById('modalMemoryList');

            modalTitle.textContent = `${year}年${month}月${day}日`;
            modalSolar.textContent = `${year}年${month}月${day}日 星期${'日一二三四五六'[new Date(year, month - 1, day).getDay()]}`;

            if (lunar) {
                modalLunar.textContent = `${lunar.yearGanZhi}年(${lunar.animal}年) ${lunar.monthStr}${lunar.dayStr}`;
            } else {
                modalLunar.textContent = '农历数据错误';
            }

            let festivalText = '';
            if (festival) festivalText += festival;
            if (term) festivalText += (festival ? ' | ' : '') + term;
            modalFestival.textContent = festivalText || '无';

            // 纪念日列表
            modalMemoryList.innerHTML = '<h4 style="color:#764ba2;margin-bottom:10px;">💕 我们的纪念日</h4>';
            
            if (dayMemories.length > 0) {
                dayMemories.forEach((memory, index) => {
                    const item = document.createElement('div');
                    item.className = 'memory-item';
                    item.innerHTML = `
                        <span>${memory}</span>
                        <button onclick="deleteMemory('${dateStr}', ${index})">删除</button>
                    `;
                    modalMemoryList.appendChild(item);
                });
            } else {
                modalMemoryList.innerHTML += '<p style="color:#999;text-align:center;">暂无纪念日</p>';
            }

            modal.classList.add('active');
        }

        function deleteMemory(dateStr, index) {
            if (confirm('确定要删除这个纪念日吗？')) {
                removeMemory(dateStr, index);
                renderCalendar(currentYear);
                document.getElementById('dayModal').classList.remove('active');
            }
        }

        // ==================== 事件绑定 ====================
        document.getElementById('prevYear').addEventListener('click', () => {
            currentYear--;
            document.getElementById('currentYear').textContent = currentYear;
            renderCalendar(currentYear);
        });

        document.getElementById('nextYear').addEventListener('click', () => {
            currentYear++;
            document.getElementById('currentYear').textContent = currentYear;
            renderCalendar(currentYear);
        });

        document.getElementById('addMemoryBtn').addEventListener('click', () => {
            const dateInput = document.getElementById('memoryDate');
            const textInput = document.getElementById('memoryText');
            
            if (!dateInput.value) {
                alert('请选择日期！');
                return;
            }
            if (!textInput.value.trim()) {
                alert('请输入纪念日描述！');
                return;
            }

            const dateParts = dateInput.value.split('-');
            const dateStr = `${parseInt(dateParts[0])}-${parseInt(dateParts[1])}-${parseInt(dateParts[2])}`;
            
            addMemory(dateStr, textInput.value.trim());
            alert('纪念日添加成功！💕');
            
            textInput.value = '';
            renderCalendar(currentYear);
        });

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('dayModal').classList.remove('active');
        });

        document.getElementById('dayModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('dayModal')) {
                document.getElementById('dayModal').classList.remove('active');
            }
        });

        // 设置默认日期为今天
        const todayDate = new Date();
        document.getElementById('memoryDate').value = 
            `${todayDate.getFullYear()}-${String(todayDate.getMonth() + 1).padStart(2, '0')}-${String(todayDate.getDate()).padStart(2, '0')}`;

        // 初始化日历
        renderCalendar(currentYear);

        // 显示当前年份
        document.getElementById('currentYear').textContent = currentYear;

        // 添加键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('dayModal').classList.remove('active');
            }
        });

    </script>
</body>
</html>
